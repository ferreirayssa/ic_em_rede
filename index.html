<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interativo ES</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8fafc;
            padding: 20px;
        }

        .map-card {
            width: 100%;
            max-width: 100%;
            overflow: hidden; 
            position: relative;
        }

        #mapa-es {
            cursor: grab;
        }

        #mapa-es:active {
            cursor: grabbing;
        }

        .municipio {
            stroke: #fff;
            stroke-width: 0.4px;
            transition: fill 0.2s ease;
            cursor: pointer;
        }

        .municipio:hover {
            filter: brightness(0.9);
            stroke: #ffffff;
            stroke-width: 1px;
        }

        .tooltip {
            position: absolute;
            padding: 8px 12px;
            background: #1e293b;
            color: white;
            border-radius: 6px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h2 style="color: #334155;">Mapa do Espírito Santo</h2>
    <p style="font-size: 12px; color: #64748b; margin-top: -10px;">Use o scroll para Zoom e arraste para mover</p>
    
    <div id="tooltip" class="tooltip"></div>

    <div class="map-card">
        <svg id="mapa-es" width="100%" height="600" viewBox="0 0 400 600"></svg>
    </div>

    <script>
        const svg = d3.select("#mapa-es");
        const tooltip = d3.select("#tooltip");

        // Criamos um grupo (g) principal para conter o mapa. 
        // O zoom será aplicado a este grupo para não distorcer o SVG pai.
        const g = svg.append("g");

        // Configuração do Zoom
        const zoom = d3.zoom()
            .scaleExtent([1, 8]) // Limite: zoom mínimo 1x, máximo 8x
            .on("zoom", (event) => {
                g.attr("transform", event.transform); // Aplica a transformação ao grupo g
            });

        svg.call(zoom);

        const projection = d3.geoMercator()
            .center([-40.3, -19.2]) 
            .scale(8000)            
            .translate([200, 300]);

        const pathGenerator = d3.geoPath().projection(projection);

        d3.json("ES_Municipios.json").then(data => {
            
            g.selectAll("path") // Agora selecionamos dentro do grupo 'g'
                .data(data.features)
                .enter()
                .append("path")
                .attr("d", pathGenerator)
                .attr("class", "municipio")
                .attr("fill", () => {
                    const h = Math.floor(Math.random() * 360);
                    return `hsl(${h}, 50%, 75%)`;
                })
                .on("mouseover", function(event, d) {
                    const nome = d.properties.NM_MUN || d.properties.name || d.properties.nome || "Município";
                    tooltip.style("display", "block").text(nome);
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 15) + "px")
                           .style("top", (event.pageY - 15) + "px");
                })
                .on("mouseleave", function() {
                    tooltip.style("display", "none");
                })
                .on("click", function(event, d) {
                    // Impede que o clique de arrastar o mapa seja interpretado como clique no município
                    if (event.defaultPrevented) return; 
                    
                    const nome = d.properties.NM_MUN || d.properties.name || "Município";
                    alert("Você clicou em: " + nome);
                });

        }).catch(err => {
            console.error("Erro ao carregar o arquivo JSON:", err);
            document.body.innerHTML += "<p style='color:red'>Erro ao carregar o JSON. Use o Live Server do VS Code.</p>";
        });
    </script>
</body>
</html>
